# documentation.

name: Scala CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: 'sbt'
    - uses: sbt/setup-sbt@v1
    - name: Run tests with coverage
      run: sbt coverageCheck

  license-headers:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
    - name: Install addlicense
      run: go install github.com/google/addlicense@latest
    - name: Check license headers
      run: |
        git ls-files \
          '*.scala' '*.java' '*.py' '*.sh' '*.bash' \
          '*.html' '*.xml' '*.js' '*.css' '*.sbt' '*.properties' \
          | xargs "$(go env GOPATH)/bin/addlicense" -check -ignore '**/tests/resources/**' \
              -f .license-header.tmpl -c "Calin-Andrei Burloiu"
